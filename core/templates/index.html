{% extends 'base.html' %}

{% block content %}

<div class="flex justify-center items-center">
    <div class="bg-white p-6 rounded-lg w-full lg:w-3/4 grid grid-cols-4 gap-4">

        <div class="col-span-3">
            <h1 class="text-4xl">Book Tracker</h1>

            <table class="table table-zebra">
                <thead>
                  <tr>
                    <th>Name</th>
                    <th>Genre</th>
                  </tr>
                </thead>
                <tbody>
                  {% for book in books %}
                    <tr>
                        <td>{{ book.name }}</td>
                        <td>{{ book.genre }}</td>
                    </tr>
                  {% empty %}
                      <p>There is no books yet</p>
                  {% endfor %}
                </tbody>
              </table>
        </div>
        <div class="col-span-1">
            <h1 class="text-4xl">Add a Book</h1>

            <form id="book-form">
                {% csrf_token %}

                <div id="form-errors" class="text-red-500">
                    {{ form.non_field_errors }}
                </div>

                <fieldset class="field">
                    <label class="label text-lg" for="{{ form.name.id_for_label }}">{{ form.name.label }}</label>
                    {{ form.name }}
                </fieldset>

                <fieldset class="field">
                    <label class="label text-lg" for="{{ form.genre.id_for_label }}">{{ form.genre.label }}</label>
                    {{ form.genre }}
                </fieldset>

            </form>
            <button class="btn btn-success mt-4">
                Submit
            </button>
        </div>
    </div>
</div>
{% endblock %}
