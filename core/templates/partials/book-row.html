<tr>
    <td>{{ book.name }}</td>
    <td>{{ book.genre }}</td>
    <td>
        <button class="btn btn-sm btn-error"
                hx-delete="{% url 'delete-book' book.pk  %}"
                hx-target="closest tr"
                hx-on:book-deleted="this.closest('tr').remove()"
                hx-confirm="Are you sure you want to delete {{ book.name }}?">
            Delete
        </button>
    </td>
</tr>
