<tr>
    <td>
        <a class="text-blue-500 hover:text-blue-800 hover:underline cursor-pointer"
            hx-get="{% url 'book-detail' book.pk %}"
            hx-target="#container"
            hx-push-url="true"
        >{{ book.name }}
        </a>
    </td>
    <td>{{ book.genre }}</td>
    <td>
        <button class="btn btn-sm btn-error"
                hx-delete="{% url 'delete-book' book.pk  %}"
                hx-target="closest tr"
                hx-on:book-deleted="fadeOutAndRemove(this.closest('tr'))"
                hx-trigger='confirmed'
                onClick="Swal.fire(
                    {
                        title: 'Confirm',
                        text: 'Are you sure you want to delete {{ book.name }}?',
                        icon: 'warning',
                        showConfirmButton: true,
                        confirmButtonText: 'Yes, delete it!',
                        showCancelButton: true,
                        showCloseButton: true,

                    }
                ).then((result) => {
                    if (result.isConfirmed) {
                        htmx.trigger(this,'confirmed');
                    }
                })">Delete</button>
    </td>
</tr>
